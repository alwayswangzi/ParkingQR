<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>停车二维码生成器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #111;
    --paper: #f5f0e8;
    --accent: #e05c2a;
    --accent2: #2a6ee0;
    --rule: #ccc5b5;
    --card: #fdfaf4;
  }

  body {
    background: var(--paper);
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 80px;
    position: relative;
    overflow-x: hidden;
  }

  /* Ruled paper texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      transparent,
      transparent 27px,
      var(--rule) 27px,
      var(--rule) 28px
    );
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  /* Red margin line */
  body::after {
    content: '';
    position: fixed;
    left: 72px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: rgba(224, 92, 42, 0.3);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
  }

  header {
    margin-bottom: 48px;
    padding-left: 28px;
    border-left: 6px solid var(--accent);
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  h1 {
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 900;
    color: var(--ink);
    line-height: 1.1;
    letter-spacing: -0.03em;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 10px;
    font-size: 14px;
    color: #777;
    font-weight: 300;
  }

  .card {
    background: var(--card);
    border: 1.5px solid var(--rule);
    border-radius: 4px;
    padding: 32px;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.06);
  }

  .field-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 10px;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 0;
    border: 2px solid var(--ink);
    border-radius: 3px;
    overflow: hidden;
  }

  .input-prefix {
    background: var(--ink);
    color: #f5f0e8;
    padding: 14px 16px;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    user-select: none;
    letter-spacing: 0.05em;
  }

  input[type="tel"] {
    flex: 1;
    border: none;
    outline: none;
    font-size: 20px;
    font-family: "SF Mono", "Courier New", monospace;
    font-weight: 500;
    color: var(--ink);
    background: transparent;
    padding: 14px 16px;
    letter-spacing: 0.1em;
  }

  input[type="tel"]::placeholder { color: #ccc; font-weight: 300; letter-spacing: 0; }

  .note-input {
    margin-top: 20px;
  }

  input[type="text"] {
    width: 100%;
    border: 2px solid var(--rule);
    border-radius: 3px;
    outline: none;
    font-size: 15px;
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-weight: 400;
    color: var(--ink);
    background: transparent;
    padding: 12px 16px;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--ink); }

  .btn {
    display: block;
    width: 100%;
    margin-top: 28px;
    padding: 16px;
    background: var(--ink);
    color: var(--paper);
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.1em;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.25s ease;
  }

  .btn:hover::after { transform: translateX(0); }
  .btn:active { transform: scale(0.99); }
  .btn span { position: relative; z-index: 1; }

  /* Result */
  .result {
    margin-top: 32px;
    display: none;
    animation: fadeUp 0.4s ease both;
  }

  .result.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-inner {
    background: var(--card);
    border: 1.5px solid var(--rule);
    border-radius: 4px;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.06);
    overflow: hidden;
  }

  .result-header {
    background: var(--ink);
    color: var(--paper);
    padding: 14px 24px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .result-header::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4caf50;
    box-shadow: 0 0 0 3px rgba(76,175,80,0.3);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(76,175,80,0.3); }
    50% { box-shadow: 0 0 0 6px rgba(76,175,80,0.1); }
  }

  .result-body {
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .qr-frame {
    position: relative;
    padding: 16px;
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 4px;
  }

  /* Corner brackets */
  .qr-frame::before, .qr-frame::after,
  .qr-frame .corner-br, .qr-frame .corner-bl {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--accent);
    border-style: solid;
  }
  .qr-frame::before { top: -4px; left: -4px; border-width: 3px 0 0 3px; }
  .qr-frame::after  { top: -4px; right: -4px; border-width: 3px 3px 0 0; }
  .qr-frame .corner-br { bottom: -4px; right: -4px; border-width: 0 3px 3px 0; }
  .qr-frame .corner-bl { bottom: -4px; left: -4px; border-width: 0 0 3px 3px; }

  #qrcode { display: flex; justify-content: center; }
  #qrcode canvas, #qrcode img { display: block; }

  /* ── Sticker preview ── */
  .sticker-preview {
    width: 100%;
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 5px 5px 0 rgba(0,0,0,0.08);
  }

  .sticker-top {
    background: var(--ink);
    color: var(--paper);
    text-align: center;
    padding: 10px 16px 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .sticker-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 24px 16px;
    gap: 14px;
  }

  .sticker-headline {
    font-size: clamp(22px, 6vw, 30px);
    font-weight: 900;
    color: var(--ink);
    letter-spacing: 0.06em;
    text-align: center;
    line-height: 1.15;
  }

  .sticker-headline em {
    font-style: normal;
    color: var(--accent);
  }

  .sticker-qr-wrap {
    padding: 10px;
    background: #fff;
    border: 1.5px solid #e0e0e0;
    border-radius: 4px;
  }

  .sticker-note {
    font-size: 13px;
    color: #888;
    text-align: center;
    font-weight: 400;
    padding: 6px 12px;
    border-top: 1px dashed #ddd;
    width: 100%;
  }

  .qr-url {
    font-size: 11px;
    color: #bbb;
    margin-top: 4px;
    word-break: break-all;
    font-family: monospace;
    text-align: center;
    padding: 0 8px;
  }

  .btn-download {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 24px;
    background: transparent;
    border: 2px solid var(--ink);
    border-radius: 3px;
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.15s;
    text-decoration: none;
  }

  .btn-download:hover {
    background: var(--ink);
    color: var(--paper);
  }

  .divider {
    width: 100%;
    border: none;
    border-top: 1px solid var(--rule);
    margin: 8px 0;
  }

  .how-to {
    margin-top: 40px;
  }

  .how-to-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 16px;
  }

  .steps {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .step {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    font-size: 13px;
    color: #666;
    font-weight: 400;
    line-height: 1.5;
  }

  .step-num {
    flex-shrink: 0;
    width: 24px; height: 24px;
    background: var(--ink);
    color: var(--paper);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="page">
  <header>
    <p class="eyebrow">Parking QR System</p>
    <h1>停车<span>二维码</span><br>生成器</h1>
    <p class="subtitle">生成专属车牌二维码，他人扫码即可联系您</p>
  </header>

  <div class="card">
    <label class="field-label">车主联系电话</label>
    <div class="input-row">
      <span class="input-prefix">📱 +86</span>
      <input type="tel" id="phoneInput" placeholder="13800138000" maxlength="11" inputmode="numeric">
    </div>

    <div class="note-input">
      <label class="field-label">备注（可选）</label>
      <input type="text" id="noteInput" placeholder="例：白色宝马 沪A·12345">
    </div>

    <button class="btn" onclick="generate()">
      <span>生成二维码 →</span>
    </button>
  </div>

  <div class="result" id="result">
    <div class="result-inner">
      <div class="result-header">贴纸预览 · 可打印张贴于车内</div>
      <div class="result-body">

        <!-- Sticker preview -->
        <div class="sticker-preview">
          <div class="sticker-top">🚗 临时停车</div>
          <div class="sticker-body">
            <div class="sticker-headline">扫码<em>联系</em>车主</div>
            <div class="sticker-qr-wrap">
              <div id="qrcode"></div>
            </div>
            <div class="sticker-note" id="displayNote">—</div>
          </div>
        </div>

        <div class="qr-url" id="displayUrl"></div>

        <hr class="divider">
        <button class="btn-download" id="downloadBtn">
          ⬇ 下载贴纸图片
        </button>
      </div>
    </div>
  </div>

  <div class="how-to">
    <p class="how-to-title">使用说明</p>
    <div class="steps">
      <div class="step"><span class="step-num">1</span><span>填写您的手机号，点击生成二维码</span></div>
      <div class="step"><span class="step-num">2</span><span>下载二维码图片，打印并张贴在车内仪表盘</span></div>
      <div class="step"><span class="step-num">3</span><span>他人扫码后，页面显示"拨打车主电话"按钮，一键联系您</span></div>
      <div class="step"><span class="step-num">4</span><span>部署到 GitHub Pages 后替换下方链接中的域名即可</span></div>
    </div>
  </div>
</div>

<script>
  // ── AES-GCM encryption (Web Crypto API, no external deps) ──────────────
  // Must match the same KEY_HEX in call.html
  const KEY_HEX = 'a3f8c2d1e4b57690123456789abcdef0a3f8c2d1e4b57690123456789abcdef0';

  async function getKey() {
    const raw = KEY_HEX.match(/.{2}/g).map(b => parseInt(b, 16));
    return crypto.subtle.importKey(
      'raw', new Uint8Array(raw), { name: 'AES-GCM' }, false, ['encrypt']
    );
  }

  async function encryptPhone(phone) {
    const key = await getKey();
    const iv  = crypto.getRandomValues(new Uint8Array(12));
    const enc = new TextEncoder();
    const cipherBuf = await crypto.subtle.encrypt(
      { name: 'AES-GCM', iv }, key, enc.encode(phone)
    );
    // Combine iv + ciphertext → base64url (URL-safe, no padding)
    const combined = new Uint8Array(iv.byteLength + cipherBuf.byteLength);
    combined.set(iv, 0);
    combined.set(new Uint8Array(cipherBuf), iv.byteLength);
    return btoa(String.fromCharCode(...combined))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }
  // ───────────────────────────────────────────────────────────────────────

  const BASE_URL = (() => {
    const origin = location.origin;
    const base = location.pathname.replace('index.html', '');
    return `${origin}${base}call.html`;
  })();

  async function generate() {
    const raw  = document.getElementById('phoneInput').value.trim().replace(/\D/g, '');
    const note = document.getElementById('noteInput').value.trim();

    if (!raw || raw.length < 7) {
      document.getElementById('phoneInput').focus();
      shake(document.querySelector('.input-row'));
      return;
    }

    // Encrypt phone number before putting it in URL
    const encrypted = await encryptPhone(raw);

    const params = new URLSearchParams({ p: encrypted });
    if (note) params.set('note', note);
    const url = `${BASE_URL}?${params.toString()}`;

    // Update sticker preview (no phone number shown)
    document.getElementById('displayNote').textContent = note || '请尽快移车，谢谢配合 🙏';
    document.getElementById('displayUrl').textContent  = url;

    // Generate QR into preview
    const container = document.getElementById('qrcode');
    container.innerHTML = '';
    new QRCode(container, {
      text: url,
      width: 180,
      height: 180,
      colorDark: '#111111',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

    // Download: draw full sticker on an offscreen Canvas
    document.getElementById('downloadBtn').onclick = () => {
      setTimeout(() => {
        const qrCanvas = container.querySelector('canvas');
        if (!qrCanvas) return;
        drawStickerAndDownload(qrCanvas, note, raw);
      }, 150);
    };

    const result = document.getElementById('result');
    result.classList.remove('visible');
    requestAnimationFrame(() => result.classList.add('visible'));
    result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function drawStickerAndDownload(qrCanvas, note, rawPhone) {
    const W = 480, pad = 32;
    const headerH = 56;
    const titleH  = 80;
    const qrSize  = 220;
    const noteH   = 52;
    const H = headerH + titleH + qrSize + noteH + pad * 2 + 24;

    const c = document.createElement('canvas');
    c.width  = W;
    c.height = H;
    const ctx = c.getContext('2d');

    const ink   = '#111111';
    const paper = '#ffffff';
    const accent= '#e05c2a';

    // Background
    ctx.fillStyle = paper;
    ctx.fillRect(0, 0, W, H);

    // Border
    ctx.strokeStyle = ink;
    ctx.lineWidth = 4;
    ctx.strokeRect(2, 2, W - 4, H - 4);

    // Header bar
    ctx.fillStyle = ink;
    ctx.fillRect(0, 0, W, headerH);
    ctx.fillStyle = paper;
    ctx.font = `bold ${16}px -apple-system, "PingFang SC", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🚗  临时停车  TEMP PARKING', W / 2, headerH / 2);

    // Headline "扫码联系车主" — "联系" in accent, rest in ink
    const titleY = headerH + 18;
    ctx.font = `900 42px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    const part1 = '扫码', mid = '联系', part2 = '车主';
    const p1w  = ctx.measureText(part1).width;
    const midw = ctx.measureText(mid).width;
    const p2w  = ctx.measureText(part2).width;
    const rowW = p1w + midw + p2w;
    let cx = (W - rowW) / 2;

    ctx.fillStyle = ink;    ctx.fillText(part1, cx, titleY); cx += p1w;
    ctx.fillStyle = accent; ctx.fillText(mid,   cx, titleY); cx += midw;
    ctx.fillStyle = ink;    ctx.fillText(part2, cx, titleY);

    // QR code (centered)
    const qrX = (W - qrSize) / 2;
    const qrY = headerH + titleH + 8;
    // White bg + subtle border
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(qrX - 8, qrY - 8, qrSize + 16, qrSize + 16);
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineWidth = 1;
    ctx.strokeRect(qrX - 8, qrY - 8, qrSize + 16, qrSize + 16);
    ctx.drawImage(qrCanvas, qrX, qrY, qrSize, qrSize);

    // Divider
    const divY = qrY + qrSize + 16;
    ctx.strokeStyle = '#dddddd';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 4]);
    ctx.beginPath(); ctx.moveTo(pad, divY); ctx.lineTo(W - pad, divY); ctx.stroke();
    ctx.setLineDash([]);

    // Note (no phone number)
    ctx.fillStyle = '#888888';
    ctx.font = `400 ${15}px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(note || '请尽快移车，谢谢配合 🙏', W / 2, divY + noteH / 2);

    // Download
    const a = document.createElement('a');
    a.download = `parking-sticker.png`;
    a.href = c.toDataURL('image/png');
    a.click();
  }

  function formatPhone(n) {
    if (n.length === 11) return `${n.slice(0,3)} ${n.slice(3,7)} ${n.slice(7)}`;
    return n;
  }

  function shake(el) {
    el.style.border = '2px solid #e05c2a';
    setTimeout(() => el.style.border = '2px solid #111', 800);
  }

  document.getElementById('phoneInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generate();
  });
</script>
</body>
</html>
